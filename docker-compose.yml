version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: blog_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpassword
      POSTGRES_DB: blogdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bloguser -d blogdb']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bloguser:blogpassword@db:5432/blogdb?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-32ch}
      JWT_EXPIRATION: 24h
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 5242880
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
